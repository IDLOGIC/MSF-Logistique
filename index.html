<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MSF Logistique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --surface: #16161d;
  --surface2: #1e1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f5;
  --muted: #7a7a9a;
  --faint: #3a3a5a;
  --font: 'Sora', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overscroll-behavior: none; }
#app { max-width: 520px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }

/* ── MODAL SYSTEM ─────────────────────────────────────────────────────── */
.dlr-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  padding: 0 0 env(safe-area-inset-bottom,0);
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.dlr-overlay.open { opacity: 1; pointer-events: all; }
.dlr-sheet {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 28px;
  width: 100%; max-width: 520px;
  transform: translateY(32px);
  transition: transform .25s cubic-bezier(.32,1,.56,1);
  display: flex; flex-direction: column; gap: 0;
}
.dlr-overlay.open .dlr-sheet { transform: translateY(0); }
.dlr-sheet-icon { font-size: 32px; text-align: center; margin-bottom: 8px; line-height: 1; }
.dlr-sheet-title {
  font-size: 16px; font-weight: 800; text-align: center;
  margin-bottom: 8px; color: var(--text); line-height: 1.3;
}
.dlr-sheet-body {
  font-size: 13px; color: var(--muted); text-align: center;
  line-height: 1.6; margin-bottom: 20px; white-space: pre-line;
}
.dlr-sheet-actions { display: flex; flex-direction: column; gap: 8px; }
.dlr-btn-confirm {
  width: 100%; padding: 13px; border-radius: var(--radius);
  border: none; font-size: 14px; font-weight: 800; font-family: var(--font);
  cursor: pointer; transition: opacity .15s;
}
.dlr-btn-confirm:active { opacity: .7; }
.dlr-btn-confirm.danger  { background: #ef4444; color: #fff; }
.dlr-btn-confirm.warning { background: #f59e0b; color: #000; }
.dlr-btn-confirm.primary { background: var(--text); color: var(--bg); }
.dlr-btn-cancel {
  width: 100%; padding: 11px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: transparent;
  font-size: 13px; font-weight: 700; color: var(--muted);
  font-family: var(--font); cursor: pointer; transition: opacity .15s;
}
.dlr-btn-cancel:active { opacity: .7; }

/* HEADER */
.header { background: var(--surface); padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; }
.logo-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.week-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
.urgent-badge { background: #ef4444; color: #fff; border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 800; cursor: pointer; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 14px 14px 90px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 520px; background: rgba(14,14,20,0.98); border-top: 1px solid var(--border); display: flex; padding: 6px 0 20px; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); gap: 4px; padding-left: 4px; padding-right: 4px; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 7px 2px 5px; border: none; background: transparent; cursor: pointer; color: var(--muted); transition: all .2s; position: relative; border-radius: 10px; }
.nav-btn .nav-icon { font-size: 19px; line-height: 1; transition: transform .2s; }
.nav-btn .nav-label { font-size: 9px; font-weight: 700; letter-spacing: 0.3px; font-family: var(--font); transition: color .2s; }
.nav-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 1px; display: none; }
.nav-btn.active .nav-dot { display: block; }
.nav-btn.active .nav-icon { transform: scale(1.15); }
.nav-notif { position: absolute; top: 4px; right: calc(50% - 14px); width: 8px; height: 8px; border-radius: 50%; background: #ef4444; border: 2px solid var(--bg); }

/* Couleurs par onglet — inspirées des associations partenaires */
/* Accueil → MSF rouge */
#nav-home { --nav-color: #E63946; --nav-bg: rgba(230,57,70,0.14); }
/* Planning → rouge foncé */
#nav-planning { --nav-color: #c1121f; --nav-bg: rgba(193,18,31,0.14); }
/* Missions → MSF rouge */
#nav-missions { --nav-color: #E63946; --nav-bg: rgba(230,57,70,0.14); }
/* Stock → vert */
#nav-stock { --nav-color: #52B788; --nav-bg: rgba(82,183,136,0.14); }
/* Envois → bleu ciel */
#nav-logistics { --nav-color: #009FD9; --nav-bg: rgba(0,159,217,0.14); }
/* Tablettes → violet */
#nav-tablettes { --nav-color: #9B5DE5; --nav-bg: rgba(155,93,229,0.14); }
/* Prestataires → orange chaud */
#nav-prestataires { --nav-color: #f97316; --nav-bg: rgba(249,115,22,0.14); }
/* Paramètres → gris neutre */
#nav-settings { --nav-color: #94a3b8; --nav-bg: rgba(148,163,184,0.14); }

.nav-btn.active {
  color: #fff;
  background: var(--nav-bg);
}
.nav-btn.active .nav-label {
  color: var(--nav-color);
}
.nav-btn.active .nav-dot {
  background: var(--nav-color);
}
/* Hover subtil */
.nav-btn:not(.active):hover {
  color: var(--nav-color, var(--muted));
  background: rgba(255,255,255,0.04);
}

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.card-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 12px; }
.card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title-row .card-title { margin-bottom: 0; }
.card-count { font-size: 11px; color: var(--faint); font-family: var(--mono); }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
.kpi-val { font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
.kpi-label { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }

/* ASSO AVATAR */
.asso-avatar { border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; font-family: var(--font); letter-spacing: -0.5px; }

/* MISSION ROW */
.mission-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.mission-row:last-child { border-bottom: none; }
.mission-row:active { opacity: .7; }
.mission-info { flex: 1; min-width: 0; }
.mission-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.mission-detail { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mission-right { text-align: right; flex-shrink: 0; }
.mission-days { font-size: 11px; font-family: var(--mono); }
.chevron { font-size: 14px; color: var(--faint); }

/* BADGES */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
.badge-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-active { background: #052e1633; color: #34d399; }
.badge-active .badge-dot { background: #34d399; }
.badge-upcoming { background: #1e3a8a33; color: #60a5fa; }
.badge-upcoming .badge-dot { background: #60a5fa; }
.badge-past { background: #1f1f2e; color: var(--muted); }
.badge-past .badge-dot { background: var(--faint); }
.badge-iti { background: #78350f33; color: #fbbf24; }
.badge-sp { background: #0c4a6e33; color: #38bdf8; }
.badge-fixe { background: #2e1065aa; color: #c084fc; }
.badge-street { background: #052e1633; color: #4ade80; }

/* STOCK BADGE */
.stock-ok { color: #34d399; font-weight: 800; }
.stock-low { color: #fbbf24; font-weight: 800; }
.stock-zero { color: #f87171; font-weight: 800; }

/* ALERT BOX */
.alert-box { background: #7f1d1d33; border: 1px solid #ef444433; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fca5a5; margin-bottom: 10px; }
.info-box { background: #78350f33; border: 1px solid #f59e0b44; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fcd34d; margin-bottom: 12px; line-height: 1.7; }

/* LOGISTICS EVENT */
.log-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); transition: opacity .15s; }
.log-row:last-child { border-bottom: none; }
.log-row[onclick]:hover { opacity: .75; }
.log-row[onclick]:active { opacity: .5; }
.log-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.log-envoi .log-icon { background: #1e3a8a33; color: #60a5fa; }
.log-retour .log-icon { background: #052e1633; color: #34d399; }
.log-info { flex: 1; min-width: 0; }
.log-name { font-size: 12px; font-weight: 700; }
.log-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.log-date { text-align: right; flex-shrink: 0; }
.log-date-val { font-size: 12px; font-weight: 800; font-family: var(--mono); }
.log-date-d { font-size: 10px; color: var(--muted); }
.log-urgent .log-date-val { color: #f87171; }
.log-urgent .log-date-d { color: #f87171; }

/* RETARD RETOUR */
.alert-overdue { background: #4a0d0d55; border: 1px solid #ef444466; border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; color: #fca5a5; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 8px; }
.alert-overdue-icon { font-size: 18px; flex-shrink: 0; }
.alert-overdue-content { flex: 1; }
.alert-overdue-title { font-weight: 800; font-size: 13px; color: #f87171; margin-bottom: 4px; }
.alert-overdue-row { padding: 6px 0; border-bottom: 1px solid rgba(239,68,68,0.15); font-size: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.alert-overdue-row:last-child { border-bottom: none; }
.alert-overdue-row:active { opacity: .7; }
.overdue-days { font-family: var(--mono); font-weight: 800; color: #f87171; font-size: 13px; }

/* GANTT */
.gantt-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.gantt-inner { min-width: 440px; }
.gantt-months { display: flex; margin-left: 80px; margin-bottom: 4px; }
.gantt-month { font-size: 9px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
.gantt-row { display: flex; align-items: center; margin-bottom: 5px; }
.gantt-label { width: 80px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; }
.gantt-label-text { font-size: 9px; font-weight: 700; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px; }
.gantt-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 6px; position: relative; overflow: hidden; }
.gantt-bar { position: absolute; top: 3px; height: 16px; border-radius: 4px; display: flex; align-items: center; padding: 0 5px; overflow: hidden; cursor: pointer; transition: opacity .15s; }
.gantt-bar:hover { opacity: .8; }
.gantt-bar-label { font-size: 8px; color: rgba(255,255,255,.85); font-weight: 700; white-space: nowrap; }
.gantt-today { position: absolute; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 10; }

/* FILTERS */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filter-sel { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; cursor: pointer; }
.search-inp { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; width: 100%; margin-bottom: 10px; }
.search-inp::placeholder { color: var(--muted); }
.filter-sel option { background: #1e1e28; }

/* STOCK ASSO BLOCK */
.stock-asso-block { margin-bottom: 10px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.stock-asso-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid; }
.stock-asso-header-name { font-weight: 800; font-size: 13px; flex: 1; }
.stock-asso-header-count { font-size: 11px; font-family: var(--mono); }
.stock-item-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; border-bottom: 1px solid var(--border); }
.stock-item-row:last-child { border-bottom: none; }
.stock-item-name { font-size: 12px; color: var(--muted); }
.stock-item-taille { background: var(--surface2); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-family: var(--mono); color: var(--muted); }
.stock-qty { font-size: 14px; font-weight: 800; }
.stock-status { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
.s-ok { background: #052e1633; color: #34d399; }
.s-low { background: #78350f33; color: #fbbf24; }
.s-zero { background: #7f1d1d33; color: #f87171; }
.s-mission { background: #1e3a8a33; color: #60a5fa; }

/* TABLETTE ROW */
.tab-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tab-row:last-child { border-bottom: none; }
.tab-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.tab-info { flex: 1; min-width: 0; }
.tab-nom { font-size: 13px; font-weight: 700; }
.tab-serie { font-size: 10px; color: var(--muted); font-family: var(--mono); }
.tab-note { font-size: 11px; color: #fbbf24; margin-top: 1px; }
.tab-right { text-align: right; }
.tab-ios { font-size: 10px; color: var(--muted); font-family: var(--mono); }

/* DETAIL CARD */
.detail-header { border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border-left: 4px solid; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; margin-top: 10px; }
.detail-field { }
.detail-label { color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.detail-val { font-weight: 700; margin-top: 2px; }
.detail-val.mono { font-family: var(--mono); font-size: 11px; }

/* LOG CARD */
.log-action-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); margin-bottom: 8px; }
.log-action-card.urgent { border-color: #f59e0b44; background: #78350f22; }
.log-action-icon { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.log-action-info { flex: 1; }
.log-action-title { font-size: 12px; font-weight: 700; }
.log-action-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.log-action-status { font-size: 11px; font-weight: 800; text-align: right; flex-shrink: 0; }

/* MVT FORM */
.mvt-form { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
.mvt-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.form-field-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.form-inp { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; color: var(--text); font-family: var(--font); outline: none; width: 100%; }
.form-inp option { background: #1e1e28; }

/* BUTTONS */
.btn { padding: 10px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--font); transition: opacity .15s; }
.btn:active { opacity: .7; }
.btn-primary { background: var(--text); color: var(--bg); }
.btn-ghost { background: var(--surface2); color: var(--muted); }
.btn-full { width: 100%; padding: 12px; border-radius: var(--radius); margin-bottom: 12px; }
.btn-back { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; padding: 0 0 14px 0; font-family: var(--font); display: flex; align-items: center; gap: 5px; }

/* PROGRESS */
.progress-wrap { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-top: 4px; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .4s; }

/* SECTION DIVIDER */
.section-sep { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--faint); margin: 14px 0 8px; }

/* HISTORY ROW */
.history-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.history-row:last-child { border-bottom: none; }

/* QUARTER TABS */
.quarter-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.q-tab { padding: 6px 13px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; font-family: var(--font); }
.q-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* CROISE ROW */
.croise-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
.croise-row:last-child { border-bottom: none; }
.croise-missions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.croise-mission-tag { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

/* SCROLL indicator */
.scroll-hint { text-align: center; font-size: 10px; color: var(--faint); padding: 8px 0; }

/* RETOUR PARTIEL */
.retour-partiel-bar { height: 5px; border-radius: 99px; overflow: hidden; background: var(--surface2); margin-top: 6px; }
.retour-partiel-fill { height: 100%; border-radius: 99px; transition: width .4s; }
.badge-partial { background: #78350f33; color: #fbbf24; }
.badge-rendu-complet { background: #052e1633; color: #34d399; }
.badge-rendu-partial { background: #78350f33; color: #fbbf24; }

/* SETTINGS / GESTION ASSOS */
.asso-manage-row { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
.asso-manage-row:last-child { border-bottom:none; }
.asso-color-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.asso-manage-name { flex:1; font-size:13px; font-weight:700; }
.asso-manage-missions { font-size:11px; color:var(--muted); font-family:var(--mono); }
.btn-delete { background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3); color:#f87171; border-radius:6px; padding:5px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:var(--font); }
.btn-delete:active { opacity:.7; }
.btn-delete:disabled { opacity:.3; cursor:not-allowed; }
.add-asso-form { background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; margin-bottom:14px; }
.color-picker-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-top:6px; }
.color-swatch { width:100%; aspect-ratio:1; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
.color-swatch.selected { border-color:#fff; transform:scale(1.1); }

.badge-annulee { background: rgba(239,68,68,0.12); color: #f87171; }
.badge-annulee .badge-dot { background: #f87171; }
.annuler-btn { width:100%; padding:12px; border-radius:var(--radius); border:2px solid #f97316; background:rgba(249,115,22,.08); color:#fb923c; font-weight:800; font-size:13px; cursor:pointer; font-family:var(--font); margin-top:8px; transition:all .15s; }
.annuler-btn:hover { background:rgba(249,115,22,.18); }
.restore-btn { background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:10px; font-weight:700; padding:4px 8px; cursor:pointer; margin-left:auto; white-space:nowrap; font-family:var(--font); }

/* RETOUR LIGNE PAR LIGNE */
.retour-ligne-row { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:8px; margin-bottom:5px; border:1px solid var(--border); background:var(--surface2); }
.retour-ligne-label { flex:1; font-size:12px; font-weight:700; }
.retour-ligne-taille { background:rgba(59,130,246,.2); color:#93c5fd; border-radius:4px; padding:1px 6px; font-size:10px; font-family:var(--mono); margin-left:4px; }
.retour-ligne-manquant { color:#f87171; font-size:10px; font-weight:800; margin-left:4px; }
.retour-qty-btn { width:28px; height:28px; border-radius:6px; border:1px solid var(--border2); background:var(--surface); color:var(--text); font-size:16px; font-weight:900; cursor:pointer; display:flex;align-items:center;justify-content:center; flex-shrink:0; }
.retour-qty-val { font-size:16px; font-weight:900; font-family:var(--mono); min-width:22px; text-align:center; color:#34d399; }
.retour-qty-sent { font-size:11px; color:var(--muted); font-family:var(--mono); }

/* ── LOGIN SCREEN ──────────────────────────────────────────────────────── */
#login-screen {
  position: fixed; inset: 0; z-index: 99999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px;
  gap: 0;
}
.login-logo {
  width: 72px; height: 72px; border-radius: 20px;
  background: linear-gradient(135deg, #e63946, #c1121f);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(230,57,70,0.35);
}
.login-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; text-align: center; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 32px; }
.login-card {
  width: 100%; max-width: 360px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; padding: 24px;
}
.login-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 8px; }
.login-inp {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 12px 14px;
  font-size: 16px; font-family: var(--mono); color: var(--text);
  outline: none; letter-spacing: 3px; margin-bottom: 16px;
  transition: border-color .15s;
}
.login-inp:focus { border-color: #e63946; }
.login-inp.shake { animation: shake .35s; }
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
.login-btn {
  width: 100%; padding: 13px; border-radius: var(--radius);
  border: none; background: #e63946; color: #fff;
  font-size: 14px; font-weight: 800; font-family: var(--font);
  cursor: pointer; transition: opacity .15s;
}
.login-btn:active { opacity: .8; }
.login-error { font-size: 12px; color: #f87171; text-align: center; margin-top: 10px; min-height: 18px; }

/* CLOTURE MISSION */
.cloture-btn { width:100%; padding:12px; border-radius:var(--radius); border:2px solid #ef4444; background:rgba(239,68,68,.1); color:#f87171; font-weight:800; font-size:13px; cursor:pointer; font-family:var(--font); margin-top:8px; transition:all .15s; }
.cloture-btn:hover { background:rgba(239,68,68,.2); }
.cloture-form { background:#1a0a0a; border:1px solid #ef444455; border-radius:var(--radius); padding:14px; margin-top:10px; }
.manquant-tag { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; background:rgba(248,113,113,.15); border:1px solid rgba(248,113,113,.3); color:#f87171; margin:2px; }
</style>
</head>

<script>
// ─── AUTHENTIFICATION ─────────────────────────────────────────────────────────
const LOGIN_KEY = 'msf_logistique_pwd';
const SESSION_KEY = 'msf_logistique_session';
const DEFAULT_PWD = 'msf2025'; // mot de passe par défaut au premier lancement

function _getStoredPwd() {
  return localStorage.getItem(LOGIN_KEY) || DEFAULT_PWD;
}

function _isSessionActive() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

function doLogin() {
  const inp = document.getElementById('login-pwd');
  const val = inp.value;
  if (val === _getStoredPwd()) {
    sessionStorage.setItem(SESSION_KEY, '1');
    const screen = document.getElementById('login-screen');
    screen.style.opacity = '0';
    screen.style.transition = 'opacity .3s';
    setTimeout(() => {
      screen.remove();
      _launchApp();
    }, 300);
  } else {
    const err = document.getElementById('login-error');
    err.textContent = 'Mot de passe incorrect, réessayez.';
    inp.value = '';
    inp.classList.remove('shake');
    void inp.offsetWidth; // reflow pour réinitialiser l'animation
    inp.classList.add('shake');
    inp.focus();
  }
}

async function _launchApp() {
  document.getElementById('header-date').textContent = TODAY.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('week-badge').textContent = 'S.' + weekNum(TODAY);
  render();
  await _initFirebase();

function changePassword() {
  const curEl = document.getElementById('pwd-current');
  const newEl = document.getElementById('pwd-new');
  const cfmEl = document.getElementById('pwd-confirm');
  const cur = curEl ? curEl.value : '';
  const nw  = newEl ? newEl.value : '';
  const cfm = cfmEl ? cfmEl.value : '';

  if (cur !== _getStoredPwd()) {
    showAlert('Mot de passe actuel incorrect.', {icon:'🔒', title:'Erreur'}); return;
  }
  if (nw.length < 4) {
    showAlert('Le nouveau mot de passe doit faire au moins 4 caractères.', {icon:'⚠️', title:'Trop court'}); return;
  }
  if (nw !== cfm) {
    showAlert('Les deux mots de passe ne correspondent pas.', {icon:'⚠️', title:'Confirmation incorrecte'}); return;
  }
  localStorage.setItem(LOGIN_KEY, nw);
  STATE.showChangePwd = false;
  render();
  showAlert('Mot de passe modifié avec succès !', {icon:'✅', title:'Succès'});
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function addDays(ds, n) { const d = new Date(ds); d.setDate(d.getDate()+n); return d; }
function fmtDate(d) {
  if (!d) return '–';
  const dt = (typeof d === 'string') ? new Date(d) : d;
  return dt.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'2-digit'});
}
function daysUntil(ds) {
  const d = new Date(ds);
  return Math.round((d - TODAY) / 86400000);
}
function diffDays(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000); }
function weekNum(d) { const jan1 = new Date(d.getFullYear(),0,1); return Math.ceil((((d-jan1)/86400000)+jan1.getDay()+1)/7); }

function mStatus(m) {
  if (m.annulee) return 'annulee';
  const d = new Date(m.debut), f = new Date(m.fin);
  if (TODAY >= d && TODAY <= f) return 'active';
  if (d > TODAY) return 'upcoming';
  return 'past';
}

function assoAvatar(asso, size=36) {
  const c = ac(asso);
  const init = asso.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
  const fs = Math.round(size*0.32);
  const br = Math.round(size/3);
  return `<div class="asso-avatar" style="width:${size}px;height:${size}px;border-radius:${br}px;background:${c.p};font-size:${fs}px;color:#fff;">${init}</div>`;
}

function statusBadge(st) {
  const conf = {
    active: {cls:'badge-active', dot:true, label:'En cours'},
    upcoming: {cls:'badge-upcoming', dot:true, label:'À venir'},
    past: {cls:'badge-past', dot:true, label:'Terminée'},
    annulee: {cls:'badge-annulee', dot:true, label:'Annulée'},
  }[st]||{cls:'badge-past',dot:true,label:st};
  return `<span class="badge ${conf.cls}"><span class="badge-dot"></span>${conf.label}</span>`;
}

function typeBadge(type) {
  const conf = {
    'Itinérante':{cls:'badge-iti',label:'ITI'},
    'Sites privés':{cls:'badge-sp',label:'SP'},
    'FIXE':{cls:'badge-fixe',label:'FIXE'},
    'Street':{cls:'badge-street',label:'STREET'},
    'CCO':{cls:'badge-sp',label:'CCO'},
  }[type]||{cls:'badge-past',label:type};
  return `<span class="badge ${conf.cls}">${conf.label}</span>`;
}

function getLogisticsEvents() {
  const evts = [];
  MISSIONS.forEach(m => {
    if (m.annulee) return;
    const st = mStatus(m);
    if (st === 'past') return;
    const sendDate = addDays(m.debut, -5);
    const retDate = addDays(m.fin, -3);
    if (sendDate >= TODAY || daysUntil(sendDate) > -3)
      evts.push({type:'envoi', asso:m.asso, nom:m.nom, lieu:m.lieu, date:sendDate, mId:m.id, s:m.s});
    if (retDate >= TODAY)
      evts.push({type:'retour', asso:m.asso, nom:m.nom, lieu:m.lieu, date:retDate, mId:m.id, s:m.s, finDate:m.fin});
  });
  return evts.sort((a,b) => a.date - b.date);
}

// Tailles de vêtements exclues des alertes (peu de stock normal pour ces tailles)
const TAILLES_SANS_ALERTE = ['S', 'XXL'];
// Tailles prioritaires pour les alertes vêtements
const TAILLES_PRIORITAIRES = ['M', 'L', 'XL'];
// Matériels sans taille à surveiller en priorité
const MATERIELS_PRIORITAIRES = ['Comptoir', 'Kakémono'];

function isAlertable(s) {
  if (s.taille && TAILLES_SANS_ALERTE.includes(s.taille)) return false;
  return true;
}

// Indique si un article est "prioritaire" (M/L/XL vêtements, Comptoir, Kakémono)
function isPrioritaire(s) {
  if (MATERIELS_PRIORITAIRES.includes(s.materiel)) return true;
  if (s.taille && TAILLES_PRIORITAIRES.includes(s.taille)) return true;
  return false;
}

// Seuil d'alerte selon la priorité
function seuilAlerte(s) {
  if (isPrioritaire(s)) return 3; // seuil plus haut pour les prioritaires
  return 2;
}

function getAlertPriority(s) {
  // 0 = rupture prioritaire, 1 = bas stock prioritaire, 2 = rupture normal, 3 = bas stock normal
  const prio = isPrioritaire(s);
  if (s.qty === 0) return prio ? 0 : 2;
  return prio ? 1 : 3;
}

function getStockByAsso() {
  const r = {};
  STOCK.forEach(s => {
    if (!r[s.asso]) r[s.asso] = {total:0, alerts:0, alertsPrio:0};
    r[s.asso].total += s.qty;
    if (s.qty <= seuilAlerte(s) && isAlertable(s)) {
      r[s.asso].alerts++;
      if (isPrioritaire(s)) r[s.asso].alertsPrio++;
    }
  });
  return r;
}

// Nombre de tablettes disponibles (état 'ok' et non en mission)
function getTabDisponibles() {
  return TABLETTES.filter(t => t.etat === 'ok' && !t.missionId).length;
}
function getTabTotal() {
  return TABLETTES.filter(t => t.etat !== 'hs').length;
}

// Retours en retard : missions terminées depuis plus de 7 jours
// ET dont le matériel n'a pas encore été intégralement rendu
function missionToutRendu(m) {
  if (!m.materielEnvoye || m.materielEnvoye.length === 0) return true;
  return m.materielEnvoye.every((e, idx) => {
    const totalItems = (e.nb_vetements || 0) + (e.nb_tablettes || 0) + (e.nb_kakemonos || 0) + (e.nb_comptoirs || 0) + (e.nb_chargeurs || 0);
    if (totalItems === 0) return true;
    return m.checklist && m.checklist[`envoi_${idx}_rendu`] === true;
  });
}

function getOverdueMissions() {
  return MISSIONS.filter(m => {
    if (mStatus(m) !== 'past') return false;
    const deadline = addDays(m.fin, 7);
    if (!(TODAY > deadline)) return false;
    // Ne pas signaler si tout le matériel a déjà été rendu
    return !missionToutRendu(m);
  }).map(m => {
    const deadline = addDays(m.fin, 7);
    const daysLate = Math.round((TODAY - deadline) / 86400000);
    return { ...m, deadline, daysLate };
  }).sort((a, b) => b.daysLate - a.daysLate);
}

// ─── ALERTES RETOUR MATÉRIEL ─────────────────────────────────────────────────
// J-4 avant fin de mission : envoyer l'étiquette de transport retour
function getAlerteEtiquette() {
  return MISSIONS.filter(m => {
    if (m.annulee) return false;
    const st = mStatus(m);
    if (st !== 'active') return false;
    const dLeft = daysUntil(m.fin);
    return dLeft >= 0 && dLeft <= 4;
  }).map(m => ({
    ...m,
    dLeft: daysUntil(m.fin),
    etiquetteEnvoyee: !!(m.checklist||{}).etiquette_envoyee
  })).sort((a,b) => a.dLeft - b.dLeft);
}

// J+3 après fin de mission : vérifier le matériel rendu
function getAlerteVerifRetour() {
  return MISSIONS.filter(m => {
    if (m.annulee) return false;
    const st = mStatus(m);
    if (st !== 'past') return false;
    const dSinceEnd = -daysUntil(m.fin);
    if (dSinceEnd < 0 || dSinceEnd > 3) return false;
    return !(m.checklist||{}).retour_verifie;
  }).map(m => ({
    ...m,
    dSinceEnd: -daysUntil(m.fin)
  })).sort((a,b) => b.dSinceEnd - a.dSinceEnd);
}

function markEtiquetteEnvoyee(mId) {
  const m = MISSIONS.find(x => x.id === mId);
  if (!m) return;
  m.checklist = m.checklist || {};
  m.checklist.etiquette_envoyee = true;
  render();
}

function markRetourVerifie(mId) {
  const m = MISSIONS.find(x => x.id === mId);
  if (!m) return;
  m.checklist = m.checklist || {};
  m.checklist.retour_verifie = true;
  render();
}

  const st = mStatus(m);

    html += `<div class="mvt-form" style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:800;margin-bottom:10px">Nouvel envoi à ${p.nom}</div>

        <div><div class="form-field-label">Matériel</div>
          <select class="form-inp" onchange="STATE.envoiPrestaForm.materiel=this.value">
            <option value="">— Choisir —</option>
            ${[...new Set(STOCK.map(s=>s.materiel))].map(m=>`<option value="${m}" ${ef.materiel===m?'selected':''}>${m}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Taille</div>
          <select class="form-inp" onchange="STATE.envoiPrestaForm.taille=this.value">
            <option value="">—</option>
            ${['XS','S','M','L','XL','XXL'].map(t=>`<option value="${t}" ${ef.taille===t?'selected':''}>${t}</option>`).join('')}
            <option value="null" ${ef.taille==='null'?'selected':''}>Sans taille</option>
          </select></div>
        <div><div class="form-field-label">Quantité</div>
          <input class="form-inp" type="number" min="1" value="${ef.qty||1}" oninput="STATE.envoiPrestaForm.qty=+this.value"></div>
        <div><div class="form-field-label">Date envoi</div>
          <input class="form-inp" type="date" value="${ef.dateEnvoi||''}" oninput="STATE.envoiPrestaForm.dateEnvoi=this.value"></div>
      </div>
      <div style="margin-bottom:10px"><div class="form-field-label">Note</div>
        <input class="form-inp" placeholder="ex: Pour mission ITI 5..." value="${ef.note||''}" oninput="STATE.envoiPrestaForm.note=this.value"></div>
      <button class="btn btn-primary" style="width:100%" onclick="saveEnvoiPresta(${p.id})">✓ Enregistrer l'envoi</button>
    </div>`;
  }

  // Envois en cours
  if (envoisActifs.length > 0) {
    html += `<div class="card-title" style="margin-top:14px;margin-bottom:8px">Envoyé (${envoisActifs.length})</div>`;
    html += `<div class="card" style="padding:0;overflow:hidden">`;
    const rf = STATE.retourPartielPrestaForm;
    envoisActifs.forEach((e, i) => {
      const isOpen = rf && rf.prestaId === p.id && rf.envoiIdx === i;
      html += `
      <div style="border-bottom:1px solid var(--border)">
        <div style="padding:10px 14px;display:flex;align-items:center;gap:10px">
          <div style="background:#1e3a8a33;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${e.materiel}${e.taille&&e.taille!='null'?' '+e.taille:''} × ${e.qty}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${e.dateEnvoi?'Envoyé le '+fmtDate(e.dateEnvoi):''} ${e.note?'· '+e.note:''}</div>
          </div>
          <button onclick="${isOpen ? `STATE.retourPartielPrestaForm=null;render()` : `marquerRenduPresta(${p.id},${i})`}" style="background:${isOpen?'#ef444422':'#34d39922'};border:1px solid ${isOpen?'#ef444444':'#34d39944'};color:${isOpen?'#f87171':'#34d399'};border-radius:8px;padding:6px 12px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap">
            ${isOpen ? '✕ Annuler' : '↩ Retour'}
          </button>
        </div>
        ${isOpen ? `
        <div style="padding:10px 14px;background:rgba(52,211,153,0.06);border-top:1px solid var(--border)">
          <div style="font-size:11px;font-weight:800;color:#34d399;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px">Retour matériel · max ${e.qty}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1">
              <div style="font-size:10px;color:var(--muted);margin-bottom:4px">Quantité retournée</div>
              <input class="form-inp" type="number" min="1" max="${e.qty}" value="${rf.qty}"
                oninput="STATE.retourPartielPrestaForm.qty=+this.value"
                style="width:100%;font-size:14px;font-weight:800;color:#34d399;text-align:center">
            </div>
            <div style="font-size:11px;color:var(--muted);padding-top:18px">/ ${e.qty}</div>
            <div style="padding-top:18px">
              <button onclick="saveRetourPartielPresta()" style="background:#34d399;color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer">
                ✓ Confirmer
              </button>
            </div>

          ${rf.qty == e.qty ? `<div style="font-size:10px;color:#34d399;margin-top:6px">✓ Retour total — l'envoi sera clôturé</div>` : ''}
        </div>` : ''}
      </div>`;
    });
    html += `</div>`;
  }

  // Historique rendus
  if (envoisRendus.length > 0) {
    html += `<div class="card-title" style="margin-top:14px;margin-bottom:8px">Historique rendus (${envoisRendus.length})</div>`;
    html += `<div class="card" style="padding:0;overflow:hidden">`;
    [...envoisRendus].reverse().forEach(e => {
      html += `
      <div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;opacity:.65">
        <div style="background:#052e1633;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${e.partiel ? '↩' : '✓'}</div>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px">
            ${e.materiel}${e.taille&&e.taille!='null'?' '+e.taille:''} × ${e.qty}
            ${e.partiel ? `<span style="background:#78350f33;color:#fbbf24;border-radius:20px;padding:1px 7px;font-size:9px;font-weight:700">PARTIEL</span>` : ''}

        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (!envoisActifs.length && !envoisRendus.length) {
    html += `<div class="card" style="margin-top:14px"><div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Aucun envoi enregistré</div></div>`;
  }

  return html;
}

function openPresta(id) { STATE.selectedPresta = id; render(); }

function saveAddPresta() {
  const f = STATE.addPrestaForm;
  if (!f.nom) { showAlert('Le nom est requis', {icon:'📛', title:'Champ requis'}); return; }
  const newId = Math.max(101, ...PRESTATAIRES.map(p=>p.id)) + 1;
  PRESTATAIRES.push({id:newId, nom:f.nom, structure:f.structure||'', adresse:f.adresse||'', tel:f.tel||'', email:f.email||'', actif:true, envois:[]});
  STATE.showAddPresta = false;
  STATE.addPrestaForm = {nom:'', structure:'', adresse:'', tel:'', email:''};
  render();
}

function saveEditPresta(id) {
  const p = PRESTATAIRES.find(x=>x.id===id);
  const ef = STATE.editPrestaForm;
  if (!ef.nom && !ef.structure) { showAlert('Le nom ou la structure est requis', {icon:'📛'}); return; }
  p.nom       = ef.nom       || p.nom;
  p.structure = ef.structure || p.structure;
  p.tel       = ef.tel;
  p.email     = ef.email;
  p.adresse   = ef.adresse;
  STATE.showEditPresta = null;
  render();
}

function desactiverPresta(id) {
  showConfirm('Désactiver ce prestataire ? Il restera dans l\'historique.', {icon:'🚫', title:'Désactiver', confirmLabel:'Désactiver', warning:true}).then(ok => {
    if (!ok) return;
    const p = PRESTATAIRES.find(x=>x.id===id);
    if (p) { p.actif = false; STATE.selectedPresta = null; render(); }
  });
}

function reactiverPresta(id) {
  const p = PRESTATAIRES.find(x=>x.id===id);
  if (p) { p.actif = true; render(); }
}

function saveEnvoiPresta(id) {
  const p = PRESTATAIRES.find(x=>x.id===id);
  const ef = STATE.envoiPrestaForm;
  if (!ef.materiel) { showAlert('Choisissez un matériel', {icon:'📦'}); return; }
  if (!ef.qty || ef.qty < 1) { showAlert('Quantité invalide', {icon:'📦'}); return; }
  // Déduire du stock
  const s = STOCK.find(x => x.materiel===ef.materiel && (ef.taille==='null'?!x.taille:x.taille===ef.taille));
  if (s) {
    if (s.qty < ef.qty) { showAlert(`Stock insuffisant (${s.qty} disponible)`, {icon:'⚠️', title:'Stock insuffisant'}); return; }
    s.qty -= ef.qty;
  }
  p.envois = p.envois||[];
  p.envois.push({materiel:ef.materiel, taille:ef.taille||null, qty:ef.qty, dateEnvoi:ef.dateEnvoi||new Date().toISOString().slice(0,10), note:ef.note||'', rendu:false});
  STATE.showEnvoiPrestaForm = null;
  STATE.envoiPrestaForm = {materiel:'', taille:'', qty:1, dateEnvoi:'', note:''};
  render();
}

function marquerRenduPresta(id, idx) {
  const p = PRESTATAIRES.find(x=>x.id===id);
  const envoisActifs = (p.envois||[]).filter(e=>!e.rendu);
  const envoi = envoisActifs[idx];
  if (!envoi) return;
  // Ouvrir le formulaire de retour partiel pour cet envoi
  STATE.retourPartielPrestaForm = { prestaId: id, envoiIdx: idx, qty: envoi.qty };
  render();
}

function saveRetourPartielPresta() {
  const rf = STATE.retourPartielPrestaForm;
  if (!rf) return;
  const p = PRESTATAIRES.find(x=>x.id===rf.prestaId);
  // Trouver le bon envoi actif par index dans les envois non rendus
  const envoisActifs = (p.envois||[]).filter(e=>!e.rendu);
  const envoi = envoisActifs[rf.envoiIdx];
  if (!envoi) { STATE.retourPartielPrestaForm = null; render(); return; }

  const qtyRetour = rf.qty;
  if (!qtyRetour || qtyRetour < 1 || qtyRetour > envoi.qty) {
    showAlert(`Quantité invalide (max : ${envoi.qty})`, {icon:'⚠️', title:'Quantité incorrecte'}); return;
  }

  const today = new Date().toISOString().slice(0,10);
  const s = STOCK.find(x => x.materiel===envoi.materiel && (envoi.taille==='null'||!envoi.taille?!x.taille:x.taille===envoi.taille));

  if (qtyRetour === envoi.qty) {
    // Retour total
    envoi.rendu = true;
    envoi.dateRetour = today;
    if (s) s.qty += qtyRetour;
  } else {
    // Retour partiel
    const qtyRestante = envoi.qty - qtyRetour;
    envoi.qty = qtyRestante;
    p.envois.push({
      materiel: envoi.materiel,
      taille: envoi.taille,
      qty: qtyRetour,
      dateEnvoi: envoi.dateEnvoi,
      note: envoi.note || '',
      rendu: true,
      dateRetour: today,
      partiel: true
    });
    if (s) s.qty += qtyRetour;
  }

  STATE.retourPartielPrestaForm = null;
  render();
}

function renderHome() {
  const active = MISSIONS.filter(m => mStatus(m) === 'active');

  const evts = getLogisticsEvents();

  // Séparer envois et retours, limiter à 7 chacun
  const prochainEnvois = evts.filter(e => e.type === 'envoi').slice(0, 7);
  const prochainRetours = evts.filter(e => e.type === 'retour').slice(0, 7);

  const urgentEnvois = prochainEnvois.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=3; }).length;
  const urgentRetours = prochainRetours.filter(e => { const d=daysUntil(e.date); return d>=0&&d<=3; }).length;

  const overdue = getOverdueMissions();

  // Stock alertes missions actives
  const criticalStock = STOCK
    .filter(s => s.qty <= seuilAlerte(s) && isAlertable(s))
    .sort((a, b) => getAlertPriority(a) - getAlertPriority(b));
  const criticalStockActive = criticalStock.filter(s => active.some(m=>m.asso===s.asso));
  const criticalPrioActive = criticalStockActive.filter(s => isPrioritaire(s));

  // Tablettes
  const tabDispo = getTabDisponibles();
  const tabTotal = getTabTotal();
  const tabEnMission = TABLETTES.filter(t => t.missionId).length;
  const tabAlerte = tabDispo <= 10;

  let html = `
    <div style="font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:2px">MSF — Collecte 2026 🏥</div>

      <div class="kpi-card" onclick="setTab('missions')" style="cursor:pointer">

        <div class="kpi-label">En cours</div>
      </div>
      <div class="kpi-card" style="border-color:${(urgentEnvois+urgentRetours)>0?'#f59e0b55':'var(--border)'}">

        <div class="kpi-label">Urgents J+3</div>
      </div>
      <div class="kpi-card" onclick="setTab('tablettes')" style="cursor:pointer;border-color:${tabAlerte?'#f59e0b44':'var(--border)'}">
        <div class="kpi-val" style="color:${tabAlerte?'#fbbf24':'#9b5de5'}">${tabDispo}</div>
        <div class="kpi-label">📱 Dispo</div>
      </div>
    </div>`;

  // Alertes overdue

        <div class="alert-overdue-title">Retour matériel en retard — ${overdue.length} mission(s)</div>

            <div style="display:flex;align-items:center;gap:8px;flex:1;cursor:pointer" onclick="openMission(${m.id})">
              ${assoAvatar(m.asso, 24)}
              <div>

                ${retourStatus.partial ? `<div style="font-size:10px;color:#fbbf24;margin-top:2px">⚠ Partiel : ${retourStatus.rendus}/${retourStatus.total}</div>` : ''}
              </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">

    </div>
    ${prochainEnvois.length === 0
      ? `<div style="font-size:12px;color:var(--faint);padding:8px 0;text-align:center">Aucun envoi prévu prochainement</div>`
      : prochainEnvois.map(e => renderLogRow(e)).join('')}
  </div>`;

  // ── PROCHAINS RETOURS ─────────────────────────────────────────────
  html += `<div class="card" style="margin-bottom:10px">
    <div class="card-title-row" style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:#34d399;flex-shrink:0"></div>
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted)">Prochains retours</div>
      </div>
      ${urgentRetours > 0 ? `<span style="background:#052e1644;color:#34d399;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:800">⚡ ${urgentRetours} urgent${urgentRetours>1?'s':''}</span>` : `<span style="font-size:11px;color:var(--faint);font-family:var(--mono)">${prochainRetours.length}</span>`}
    </div>
    ${prochainRetours.length === 0
      ? `<div style="font-size:12px;color:var(--faint);padding:8px 0;text-align:center">Aucun retour prévu prochainement</div>`
      : prochainRetours.map(e => renderLogRow(e)).join('')}
  </div>`;

  return html;
}

function renderAssoPlanningAnnuel(asso) {
  const c = ac(asso);
  const Y = new Date().getFullYear();
  const yearStart = new Date(`${Y}-01-01`);
  const yearEnd   = new Date(`${Y}-12-31`);
  const totalDays = Math.round((yearEnd - yearStart) / 86400000) + 1;

  const missions = MISSIONS.filter(m => m.asso === asso).sort((a,b) => new Date(a.debut)-new Date(b.debut));

  // Month headers (12 months)
  const months = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  let monthsHtml = '';
  months.forEach((lbl, i) => {
    const mStart = new Date(Y, i, 1);
    const mEnd   = new Date(Y, i+1, 0);
    const days = mEnd.getDate();
    const pct = days / totalDays * 100;
    monthsHtml += `<div class="gantt-month" style="width:${pct}%;text-align:center;padding-left:2px">${lbl}</div>`;
  });

  // Today marker
  const todayOffset = Math.round((TODAY - yearStart) / 86400000);
  const todayPct = (TODAY >= yearStart && TODAY <= yearEnd) ? `${todayOffset / totalDays * 100}%` : null;

  // Build one row per mission
  let rows = '';
  if (missions.length === 0) {
    rows = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Aucune mission pour ${asso} en ${Y}</div>`;
  } else {
    missions.forEach(m => {
      const d = new Date(m.debut);
      const f = new Date(m.fin);
      const cs = d < yearStart ? yearStart : d;
      const ce = f > yearEnd   ? yearEnd   : f;
      const left  = Math.max(0, Math.round((cs - yearStart) / 86400000)) / totalDays * 100;
      const width = Math.max(0.8, (Math.round((ce - cs) / 86400000)+1) / totalDays * 100);
      const st = mStatus(m);
      const opacity = st === 'past' ? '0.4' : '1';
      const debutFmt = fmtDate(m.debut);
      const finFmt   = fmtDate(m.fin);

      // Row label: semaine de début
      const sLabel = `S.${m.s}`;

      rows += `
      <div style="display:flex;align-items:center;margin-bottom:6px;gap:6px">
        <div style="width:34px;flex-shrink:0;font-size:9px;font-weight:700;color:var(--muted);font-family:var(--mono);text-align:right">${sLabel}</div>
        <div style="flex:1;height:26px;background:var(--surface2);border-radius:6px;position:relative;overflow:visible">
          ${todayPct?`<div style="position:absolute;top:0;bottom:0;left:${todayPct};width:2px;background:#ef4444;z-index:10;border-radius:1px"></div>`:''}
          <div onclick="openMission(${m.id})"
               title="${m.lieu} · ${debutFmt} → ${finFmt} · "
               style="position:absolute;top:3px;height:20px;left:${left}%;width:${width}%;background:${c.p};opacity:${opacity};border-radius:4px;display:flex;align-items:center;padding:0 6px;cursor:pointer;transition:opacity .15s;min-width:4px;overflow:hidden"
               onmouseover="this.style.opacity='0.75'" onmouseout="this.style.opacity='${opacity}'">
            <span style="font-size:8px;color:rgba(255,255,255,.9);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.nom||m.lieu}</span>
          </div>
        </div>
      </div>`;
    });
  }

  // Stats
  const nbTotal    = missions.length;
  const nbActive   = missions.filter(m=>mStatus(m)==='active').length;
  const nbUpcoming = missions.filter(m=>mStatus(m)==='upcoming').length;
  const nbPast     = missions.filter(m=>mStatus(m)==='past').length;

  // List below gantt
  let listHtml = missions.map(m => renderMissionRow(m, true)).join('');

  return `
    <button class="btn-back" onclick="closeAssoPlanningAnnuel()">← Retour au planning</button>

    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      ${assoAvatar(asso, 44)}
      <div>
        <div style="font-size:20px;font-weight:900;letter-spacing:-0.5px">${asso}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Planning annuel ${Y} · ${nbTotal} mission${nbTotal>1?'s':''}</div>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:14px">
      <div class="kpi-card" style="border-color:${nbActive?'#34d39933':'var(--border)'}">
        <div class="kpi-val" style="color:#34d399;font-size:24px">${nbActive}</div>
        <div class="kpi-label">En cours</div>
      </div>
      <div class="kpi-card" style="border-color:${nbUpcoming?'#60a5fa33':'var(--border)'}">
        <div class="kpi-val" style="color:#60a5fa;font-size:24px">${nbUpcoming}</div>
        <div class="kpi-label">À venir</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-val" style="font-size:24px;color:var(--muted)">${nbPast}</div>
        <div class="kpi-label">Terminées</div>
      </div>
    </div>

    <div class="card" style="padding:14px 12px;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:10px">Gantt annuel ${Y}</div>
      <div class="gantt-wrap">
        <div style="min-width:440px">
          <div style="margin-left:40px;margin-bottom:4px;display:flex">${monthsHtml}</div>
          ${rows}
        </div>
      </div>
      ${todayPct?`<div style="text-align:right;font-size:10px;color:#f87171;margin-top:6px;font-family:var(--mono)">▲ Aujourd'hui</div>`:''}
    </div>

    ${missions.length > 0 ? `
    <div class="card">
      <div class="card-title-row">
        <div class="card-title">Détail des missions</div>
        <div class="card-count">${missions.length}</div>
      </div>
      ${listHtml}
    </div>` : ''}
  `;
}

function renderPlanning() {
  if (STATE.selectedAsso) return renderAssoPlanningAnnuel(STATE.selectedAsso);

  const Y = new Date().getFullYear();
  const quarters = {
    Q1:{start:`${Y}-01-01`,end:`${Y}-03-31`,label:'Jan – Mars'},
    Q2:{start:`${Y}-04-01`,end:`${Y}-06-30`,label:'Avr – Juin'},
    Q3:{start:`${Y}-07-01`,end:`${Y}-09-30`,label:'Juil – Sept'},
    Q4:{start:`${Y}-10-01`,end:`${Y}-12-31`,label:'Oct – Déc'},
  };
  const q = quarters[STATE.quarter];
  const pStart = new Date(q.start), pEnd = new Date(q.end);
  const totalDays = diffDays(q.start, q.end) + 1;

  const vis = MISSIONS.filter(m => {
    const d=new Date(m.debut), f=new Date(m.fin);
    return d<=pEnd && f>=pStart && !m.annulee;
  }).sort((a,b)=>new Date(a.debut)-new Date(b.debut));

  // En-têtes mois
  let monthsHtml = '';
  let cur = new Date(pStart);
  while (cur <= pEnd) {
    const nm = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
    const endM = nm < pEnd ? nm : new Date(pEnd.getTime()+86400000);
    const days = Math.round((endM - cur) / 86400000);
    const pct = days / totalDays * 100;
    const label = cur.toLocaleDateString('fr-FR',{month:'short'}).replace('.','');
    monthsHtml += `<div class="gantt-month" style="width:${pct}%;text-align:center">${label}</div>`;
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }

  const todayPct = TODAY >= pStart && TODAY <= pEnd
    ? `${diffDays(q.start, TODAY.toISOString().split('T')[0]) / totalDays * 100}%`
    : null;

  // Couleurs par type
  const typeColors = {
    'Itinérante': '#f59e0b',
    'CCO':        '#3b82f6',
    'FIXE':       '#9b5de5',
    'Sites privés':'#34d399',
  };

  // UNE LIGNE PAR MISSION
  let ganttRows = '';
  if (vis.length === 0) {
    ganttRows = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Aucune mission ce trimestre</div>`;
  } else {
    vis.forEach(m => {
      const d = new Date(m.debut), f = new Date(m.fin);
      const cs = d < pStart ? pStart : d;
      const ce = f > pEnd   ? pEnd   : f;
      const left  = Math.max(0, diffDays(q.start, cs.toISOString().split('T')[0])) / totalDays * 100;
      const width = Math.max(1.5, (diffDays(cs.toISOString().split('T')[0], ce.toISOString().split('T')[0])+1) / totalDays * 100);
      const st = mStatus(m);
      const opacity = st === 'past' ? '0.4' : '1';
      const color = typeColors[m.type] || '#6b7280';

      // Label à gauche : nom court de la mission
      const shortNom = m.nom || m.lieu;
      const shortLabel = shortNom.length > 14 ? shortNom.slice(0,13)+'…' : shortNom;

      ganttRows += `
      <div style="display:flex;align-items:center;margin-bottom:4px;gap:4px">
        <div style="width:90px;flex-shrink:0;text-align:right;padding-right:6px;cursor:pointer" onclick="openMission(${m.id})">
          <div style="font-size:9px;font-weight:700;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px">${shortLabel}</div>
        </div>
        <div style="flex:1;height:22px;background:var(--surface2);border-radius:5px;position:relative;overflow:hidden">
          ${todayPct ? `<div style="position:absolute;top:0;bottom:0;left:${todayPct};width:2px;background:#ef4444;z-index:10"></div>` : ''}
          <div onclick="openMission(${m.id})"
               title="${m.nom||m.lieu} · ${fmtDate(m.debut)} → ${fmtDate(m.fin)}"
               style="position:absolute;top:2px;height:18px;left:${left}%;width:${width}%;background:${color};opacity:${opacity};border-radius:4px;display:flex;align-items:center;padding:0 5px;cursor:pointer;min-width:2px;overflow:hidden;transition:opacity .15s"
               onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='${opacity}'">
            <span style="font-size:8px;color:rgba(255,255,255,.95);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${fmtDate(m.debut).slice(0,5)} – ${fmtDate(m.fin).slice(0,5)}</span>
          </div>
        </div>
      </div>`;
    });
  }

  // Légende types
  const typeKeys = [...new Set(vis.map(m=>m.type))];
  const legende = typeKeys.map(t => `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--muted);margin-right:10px"><span style="width:10px;height:10px;border-radius:3px;background:${typeColors[t]||'#6b7280'};display:inline-block"></span>${t}</span>`).join('');

  const soon = MISSIONS.filter(m=>mStatus(m)==='upcoming'&&daysUntil(m.debut)>=0&&daysUntil(m.debut)<=28).sort((a,b)=>new Date(a.debut)-new Date(b.debut));

  return `
    <div class="quarter-tabs">
      ${Object.entries(quarters).map(([k,v])=>`<button class="q-tab ${STATE.quarter===k?'active':''}" onclick="STATE.quarter='${k}';render()">${k} · ${v.label}</button>`).join('')}
    </div>

    <div class="card" style="padding:12px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">${vis.length} mission${vis.length>1?'s':''} · ${q.label}</div>
        <div>${legende}</div>
      </div>
      <div class="gantt-wrap">
        <div style="min-width:380px">
          <div style="display:flex;margin-left:94px;margin-bottom:6px">${monthsHtml}</div>
          ${ganttRows}
        </div>
      </div>
      ${todayPct ? `<div style="text-align:right;font-size:10px;color:#ef4444;margin-top:4px;font-family:var(--mono)">▲ Aujourd'hui</div>` : ''}
    </div>

    ${soon.length > 0 ? `
    <div class="card-title" style="margin-bottom:8px">Prochains départs (28j)</div>
    <div class="card" style="padding:0;overflow:hidden">
      ${soon.map(m => {
        const d = daysUntil(m.debut);
        const color = typeColors[m.type] || '#6b7280';
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onclick="openMission(${m.id})">
          <div style="width:4px;height:36px;border-radius:2px;background:${color};flex-shrink:0"></div>
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700">${m.nom||m.lieu}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px">${fmtDate(m.debut)} → ${fmtDate(m.fin)} · ${m.lieu}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:13px;font-weight:800;color:${d<=7?'#f87171':'#60a5fa'}">J-${d}</div>
          </div>
          <div style="color:var(--faint)">›</div>
        </div>`;
      }).join('')}
    </div>` : ''}
  `;
}

function renderMissions() {
  if (STATE.selectedMission) return renderMissionDetail(STATE.selectedMission);

  const filtered = MISSIONS.filter(m => {
    if (STATE.filterAsso !== 'all' && m.asso !== STATE.filterAsso) return false;
    if (STATE.filterType !== 'all' && m.type !== STATE.filterType) return false;
    if (STATE.filterStatus !== 'all' && mStatus(m) !== STATE.filterStatus) return false;
    // Par défaut, masquer les missions annulées sauf si filtre explicite
    if (STATE.filterStatus === 'all' && m.annulee) return false;
    return true;
  });

  const assoOpts = [...new Set(MISSIONS.map(m=>m.asso))].sort().map(a=>`<option value="${a}" ${STATE.filterAsso===a?'selected':''}>${a}</option>`).join('');

  const allAssos = [...new Set([...MISSIONS.map(m=>m.asso),...Object.keys(ASSO_COLORS)])].sort();
  const addMissionHtml = STATE.showAddMission ? `
    <div class="mvt-form" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">➕ Nouvelle mission</div>
      <div class="mvt-form-grid">
        <div><div class="form-field-label">Association</div>
          <select class="form-inp" id="nm-asso" onchange="STATE.addMissionForm.asso=this.value">
            <option value="">--</option>
            ${allAssos.map(a=>`<option value="${a}" ${STATE.addMissionForm.asso===a?'selected':''}>${a}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Lieu</div>
          <input class="form-inp" id="nm-lieu" placeholder="ex: PARIS" value="${STATE.addMissionForm.lieu}" oninput="STATE.addMissionForm.lieu=this.value"></div>
        <div><div class="form-field-label">Nom mission</div>
          <input class="form-inp" id="nm-nom" placeholder="ex: ITI 18 Dupont" value="${STATE.addMissionForm.nom||''}" oninput="STATE.addMissionForm.nom=this.value"></div>
        <div><div class="form-field-label">Type</div>
          <select class="form-inp" id="nm-type" onchange="STATE.addMissionForm.type=this.value">
            ${['Itinérante','Sites privés','FIXE','Street'].map(t=>`<option value="${t}" ${STATE.addMissionForm.type===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
        <div><div class="form-field-label">Date début</div>
          <input type="date" class="form-inp" id="nm-debut" value="${STATE.addMissionForm.debut}" oninput="STATE.addMissionForm.debut=this.value"></div>
        <div><div class="form-field-label">Date fin</div>
          <input type="date" class="form-inp" id="nm-fin" value="${STATE.addMissionForm.fin}" oninput="STATE.addMissionForm.fin=this.value"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="addMission()">✅ Créer la mission</button>
        <button class="btn btn-ghost" style="flex:1" onclick="STATE.showAddMission=false;render()">Annuler</button>
      </div>
    </div>` : '';

  return `
    <button class="btn btn-primary btn-full" onclick="STATE.showAddMission=!STATE.showAddMission;render()">
      ${STATE.showAddMission ? '✕ Fermer' : '➕ Nouvelle mission'}
    </button>
    ${addMissionHtml}
    <div class="filters">
      <select class="filter-sel" onchange="STATE.filterAsso=this.value;setTimeout(render,50)">
        <option value="all">Toutes assos</option>${assoOpts}
      </select>
      <select class="filter-sel" onchange="STATE.filterType=this.value;setTimeout(render,50)">
        <option value="all" ${STATE.filterType==='all'?'selected':''}>Tous types</option>
        <option value="Itinérante" ${STATE.filterType==='Itinérante'?'selected':''}>Itinérante</option>
        <option value="Sites privés" ${STATE.filterType==='Sites privés'?'selected':''}>Sites privés</option>
        <option value="FIXE" ${STATE.filterType==='FIXE'?'selected':''}>Fixe</option>
      </select>
      <select class="filter-sel" onchange="STATE.filterStatus=this.value;setTimeout(render,50)">
        <option value="all" ${STATE.filterStatus==='all'?'selected':''}>Tous statuts</option>
        <option value="active" ${STATE.filterStatus==='active'?'selected':''}>En cours</option>
        <option value="upcoming" ${STATE.filterStatus==='upcoming'?'selected':''}>À venir</option>
        <option value="past" ${STATE.filterStatus==='past'?'selected':''}>Terminées</option>
        <option value="annulee" ${STATE.filterStatus==='annulee'?'selected':''}>🚫 Annulées</option>
      </select>
    </div>
    <div style="font-size:10px;color:var(--faint);font-family:var(--mono);margin-bottom:10px">${filtered.length} mission(s)</div>
    <div class="card">${filtered.map(m=>renderMissionRow(m,true)).join('')}</div>`;
}

function renderMissionDetail(m) {
  const st = mStatus(m);
  const c = ac(m.asso);
  const sendDate = addDays(m.debut, -5);
  const retDate = addDays(m.fin, -3);
  const dToSend = daysUntil(sendDate);
  const dToRet = daysUntil(retDate);
  const dLeft = daysUntil(m.fin);
  const mStock = STOCK.filter(s=>s.asso===m.asso);
  const totalStock = mStock.reduce((a,s)=>a+s.qty,0);
  const critiques = mStock.filter(s=>s.qty<=2 && isAlertable(s));
  const isEditing = STATE.editingMissionId === m.id;
  const showEnvoi = STATE.showEnvoiForm[m.id];

  function logActionCard(icon, iconBg, iconColor, title, sub, date, statusText, statusColor, urgent) {
    return `<div class="log-action-card ${urgent?'urgent':''}">
      <div class="log-action-icon" style="background:${iconBg};color:${iconColor}">${icon}</div>
      <div class="log-action-info">
        <div class="log-action-title">${title}</div>
        <div class="log-action-sub">${sub} · ${fmtDate(date)}</div>
      </div>
      <div class="log-action-status" style="color:${statusColor}">${statusText}</div>
    </div>`;
  }

  const sendStatus = dToSend < 0 ? 'Effectué' : dToSend===0 ? 'Aujourd\'hui !' : dToSend<=3 ? `Dans ${dToSend}j ⚡` : `Dans ${dToSend}j`;
  const retStatus = dToRet < 0 ? 'Passé' : dToRet===0 ? 'Aujourd\'hui !' : dToRet<=3 ? `Dans ${dToRet}j ⚡` : `Dans ${dToRet}j`;

  // Unique vetement types for this asso — seulement ceux avec stock > 0
  const vetTypes = [...new Set(STOCK.filter(s=>s.asso===m.asso && s.taille && s.qty>0).map(s=>s.materiel))].sort();
  const taillesDispos = [...new Set(STOCK.filter(s=>s.asso===m.asso && s.taille && s.qty>0).map(s=>s.taille))];
  const taillesOrder = ['XS','S','M','L','XL','XXL','XXXL'];
  taillesDispos.sort((a,b)=>taillesOrder.indexOf(a)-taillesOrder.indexOf(b));
  // Tablettes dispo : état 'ok', sans missionId (non en mission), ET non déjà engagées dans les autres envois de cette mission
  const tabsDejaEnvoyes = new Set((m.materielEnvoye||[]).flatMap(e=>e.tablettes_noms||[]));
  const tablettesDispos = TABLETTES.filter(t=>t.etat==='ok' && !t.missionId && !tabsDejaEnvoyes.has(t.nom)).map(t=>t.nom).sort();
  // Stock dispo kakémonos / comptoirs pour cette asso
  const kakDispo = (STOCK.find(s=>s.asso===m.asso && s.materiel==='Kakémono')||{}).qty||0;
  const cptDispo = (STOCK.find(s=>s.asso===m.asso && s.materiel==='Comptoir')||{}).qty||0;

  // Checklist items (materielEnvoye)
  const checklist = m.checklist || {};
  const envois = m.materielEnvoye || [];

  // Edit form
  const editForm = STATE.editMissionForm;

  let editHtml = '';
  if (isEditing) {
    editHtml = `<div class="mvt-form" style="margin-bottom:12px">
      <div style="font-weight:800;font-size:13px;margin-bottom:12px">✏️ Modifier la mission</div>
      <div class="mvt-form-grid">
        <div><div class="form-field-label">Association</div>
          <input class="form-inp" id="em-asso" value="${editForm.asso||m.asso}"></div>
        <div><div class="form-field-label">Lieu</div>
          <input class="form-inp" id="em-lieu" value="${editForm.lieu||m.lieu}"></div>
        <div><div class="form-field-label">RE</div>
          <input class="form-inp" id="em-re" value="${editForm.re||m.re||''}"></div>
        <div><div class="form-field-label">Type</div>
          <select class="form-inp" id="em-type">

            ${totalCpt ? `<div style="margin-bottom:10px">

                <span>🪑 Comptoirs</span>
                <span style="font-family:var(--mono);color:#c084fc">${retCpt}/${totalCpt}</span>
              </div>
              <div class="retour-ligne-row" style="border-color:${retCpt===totalCpt?'rgba(52,211,153,.4)':retCpt>0?'rgba(251,191,36,.4)':'var(--border)'}">
                <div class="retour-ligne-label">Comptoir${totalCpt>1?'s':''} ${totalCpt-retCpt>0&&retCpt>=0&&STATE.retourPartiel[rpKey]?`<span class="retour-ligne-manquant">−${totalCpt-retCpt} manquant${totalCpt-retCpt>1?'s':''}</span>`:''}
                </div>
                <span class="retour-qty-sent">/ ${totalCpt}</span>
                <button class="retour-qty-btn" onclick="adjustCptRetour(${m.id},${i},-1)">−</button>
                  <span class="retour-qty-val" style="color:${retCpt===totalCpt?'#34d399':retCpt>0?'#fbbf24':'var(--muted)'}">${retCpt}</span>
                  <button class="retour-qty-btn" onclick="adjustCptRetour(${m.id},${i},+1,${totalCpt})">+</button>
                  <button onclick="setRetourPartielCpt(${m.id},${i},${totalCpt});render()" style="background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);border-radius:6px;color:#34d399;font-size:10px;font-weight:800;padding:4px 8px;cursor:pointer;white-space:nowrap">Tout ✓</button>
              </div>
            </div>` : ''}

            ${totalChg ? `<div style="margin-bottom:10px">
              <div style="font-size:10px;color:var(--muted);font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between">

                </div>
                <span class="retour-qty-sent">/ ${totalChg}</span>
                <button class="retour-qty-btn" onclick="adjustChgRetour(${m.id},${i},-1)">−</button>
                  <span class="retour-qty-val" style="color:${retChg===totalChg?'#34d399':retChg>0?'#fbbf24':'var(--muted)'}">${retChg}</span>
                  <button class="retour-qty-btn" onclick="adjustChgRetour(${m.id},${i},+1,${totalChg})">+</button>

            <button onclick="validerRetourPartiel(${m.id},${i})" style="background:#34d399;border:none;border-radius:8px;color:#000;font-size:12px;font-weight:800;padding:8px 16px;cursor:pointer;width:100%;margin-top:4px">

    </div>`;
  }

  return `
    <button class="btn-back" onclick="STATE.selectedMission=null;render()">← Retour aux missions</button>
    
    ${editHtml}
    
    ${m.annulee ? `<div style="background:rgba(249,115,22,.10);border:1px solid rgba(249,115,22,.35);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🚫</span>
      <div style="flex:1">
        <div style="font-weight:800;color:#fb923c;font-size:13px">Mission annulée${m.annulee_le ? ' le '+m.annulee_le : ''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Cette mission n'apparaît plus dans le planning ni dans les envois.</div>
      </div>
      <button class="restore-btn" onclick="restaurerMission(${m.id})">↩ Restaurer</button>
    </div>` : ''}

    ${!isEditing ? `<div class="detail-header" style="background:${m.annulee ? 'rgba(249,115,22,.06)' : c.l};border-color:${m.annulee ? '#f97316' : c.p};${m.annulee ? 'opacity:0.7' : ''}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        ${assoAvatar(m.asso,44)}
        <div style="flex:1">
          <div style="font-size:18px;font-weight:900;letter-spacing:-0.5px">${m.asso}</div>
          <div style="font-size:13px;color:var(--muted)">${m.lieu}</div>

        </div>
      </div>
      <div class="detail-grid">
        <div class="detail-field"><div class="detail-label">RE</div><div class="detail-val"></div></div>
        <div class="detail-field"><div class="detail-label">Type</div><div class="detail-val">${m.type}</div></div>
        <div class="detail-field"><div class="detail-label">Début</div><div class="detail-val">${fmtDate(m.debut)}</div></div>
        <div class="detail-field"><div class="detail-label">Fin</div><div class="detail-val">${fmtDate(m.fin)}</div></div>
        ${st==='active'?`<div class="detail-field"><div class="detail-label">Reste</div><div class="detail-val" style="color:${dLeft<7?'#f87171':'var(--text)'}">${dLeft}j</div></div>`:''}
      </div>
    </div>` : ''}

    <div class="card">
      <div class="card-title">📦 Logistique mission</div>
      ${logActionCard('↗','rgba(59,130,246,.2)','#60a5fa','Envoi matériel (J−5)','Avant le début',sendDate,sendStatus,dToSend<=3&&dToSend>=0?'#fbbf24':'#60a5fa',dToSend>=0&&dToSend<=3)}
      ${logActionCard('↩','rgba(52,211,153,.2)','#34d399','Retour matériel (J−3/4)','Avant la fin',retDate,retStatus,dToRet<=3&&dToRet>=0?'#fbbf24':'#34d399',dToRet>=0&&dToRet<=3)}
      
      <div style="margin-top:12px">
        <button class="btn ${showEnvoi?'btn-ghost':'btn-primary'} btn-full" onclick="STATE.showEnvoiForm[${m.id}]=!STATE.showEnvoiForm[${m.id}];render()">
          ${showEnvoi ? '✕ Fermer' : '📤 Enregistrer un envoi de matériel'}
        </button>
      </div>
      ${envoiFormHtml}
      ${checklistHtml}
      ${(() => {
        // Bouton clôture mission si articles manquants ou mission terminée
        const hasEnvois = envois.length > 0;
        const allRendu = envois.length > 0 && envois.every((_,i2)=>{
          const rpKey2=`${m.id}_${i2}`;const rp2=STATE.retourPartiel[rpKey2]||{};
          const e2=envois[i2];
          const lgv2=e2.lignes_vetements||(e2.type_vetement&&e2.nb_vetements?[{type:e2.type_vetement,taille:e2.taille,nb:e2.nb_vetements}]:[]);
          const tv2=lgv2.reduce((a,l)=>a+l.nb,0),tt2=e2.nb_tablettes||0,tk2=e2.nb_kakemonos||0,tc2=e2.nb_comptoirs||0,tch2=e2.nb_chargeurs||0;
          const totalI=tv2+tt2+tk2+tc2+tch2;
          if(totalI===0)return true;
          let rv2=0;
          if(rp2.lignes_vetements&&rp2.lignes_vetements.length>0)rv2=rp2.lignes_vetements.reduce((a,l)=>a+(l.rendu||0),0);
          else if(rp2.vetements!==undefined)rv2=rp2.vetements; else if((m.checklist||{})[`envoi_${i2}_rendu`])rv2=tv2;
          const rtab2=(rp2.tablettes||[]).length||((m.checklist||{})[`envoi_${i2}_rendu`]?tt2:0);
          const rkak2=rp2.kakemonos!==undefined?rp2.kakemonos:((m.checklist||{})[`envoi_${i2}_rendu`]?tk2:0);
          const rcpt2=rp2.comptoirs!==undefined?rp2.comptoirs:((m.checklist||{})[`envoi_${i2}_rendu`]?tc2:0);
          const rchg2=rp2.chargeurs!==undefined?rp2.chargeurs:((m.checklist||{})[`envoi_${i2}_rendu`]?tch2:0);
          return rv2+rtab2+rkak2+rcpt2+rchg2>=totalI;
        });
        const alreadyClosed = (m.checklist||{}).mission_cloturee;
        const showClotureForm = STATE.showClotureForm[m.id];
        const cf = STATE.clotureForm[m.id] || {motif:'perdu', note:''};

        if (alreadyClosed) return `<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);border-radius:var(--radius);padding:12px 14px;margin-top:8px;display:flex;align-items:center;gap:10px">

        if (!hasEnvois) return '';
        return `<div style="margin-top:4px">
          <button class="cloture-btn" onclick="STATE.showClotureForm[${m.id}]=!STATE.showClotureForm[${m.id}];render()">

          ${showClotureForm ? `<div class="cloture-form">

              ${envois.map((e2,i2)=>{

                const lgv2=e2.lignes_vetements||(e2.type_vetement&&e2.nb_vetements?[{type:e2.type_vetement,taille:e2.taille,nb:e2.nb_vetements}]:[]);
                const manquants=[];
                lgv2.forEach(l=>{
                  const rpLigne=(rp2.lignes_vetements||[]).find(x=>x.type===l.type&&x.taille===l.taille);
                  const renduLigne=rpLigne?rpLigne.rendu:((m.checklist||{})[`envoi_${i2}_rendu`]?l.nb:0);
                  const manq=l.nb-renduLigne;
                  if(manq>0)manquants.push(`${manq}× ${l.type} ${l.taille}`);
                });
                const tt2=e2.nb_tablettes||0,tk2=e2.nb_kakemonos||0,tc2=e2.nb_comptoirs||0,tch2=e2.nb_chargeurs||0;
                const rtab2=(rp2.tablettes||[]).length;const rkak2=rp2.kakemonos||0;const rcpt2=rp2.comptoirs||0;const rchg2=rp2.chargeurs||0;
                if(tt2-rtab2>0)manquants.push(`${tt2-rtab2}× tablette(s)`);
                if(tk2-rkak2>0)manquants.push(`${tk2-rkak2}× kakémono(s)`);
                if(tc2-rcpt2>0)manquants.push(`${tc2-rcpt2}× comptoir(s)`);
                if(tch2-rchg2>0)manquants.push(`${tch2-rchg2}× chargeur(s)`);
                return manquants.length?`<div style="font-size:11px;color:#fca5a5;margin-bottom:3px">Envoi ${i2+1} : ${manquants.map(x=>`<span class="manquant-tag">${x}</span>`).join('')}</div>`:'';
              }).join('')}
            </div>` : `<div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#34d399">✅ Tout le matériel a été retourné</div>`}
            <div style="margin-bottom:10px">
              <div class="form-field-label">Motif des articles manquants</div>
              <select class="form-inp" onchange="STATE.clotureForm[${m.id}]={...(STATE.clotureForm[${m.id}]||{}),motif:this.value}">
                <option value="perdu" ${cf.motif==='perdu'?'selected':''}>🚨 Perdu</option>
                <option value="abime" ${cf.motif==='abime'?'selected':''}>🔧 Abîmé / Hors service</option>
                <option value="vol" ${cf.motif==='vol'?'selected':''}>🔓 Vol</option>
                <option value="autre" ${cf.motif==='autre'?'selected':''}>📝 Autre</option>
              </select>
            </div>
            <div style="margin-bottom:12px">
              <div class="form-field-label">Note (optionnel)</div>
              <input class="form-inp" placeholder="Ex: Kway XL perdu lors du transport..." value="${cf.note||''}" oninput="STATE.clotureForm[${m.id}]={...(STATE.clotureForm[${m.id}]||{}),note:this.value}">
            </div>

              🔒 Confirmer la clôture
            </button>

        </div>`;
      })()}

    <div class="card">
      <div class="card-title-row">
        <div class="card-title">🗃 Stock ${m.asso}</div>
        <span class="${totalStock<10?'stock-zero':totalStock<30?'stock-low':'stock-ok'}" style="font-size:18px">${totalStock} art.</span>
      </div>
      <!-- Kakémonos & Comptoirs highlight -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:var(--surface2);border-radius:10px;padding:10px 14px;border:1px solid ${kakDispo===0?'rgba(248,113,113,.35)':kakDispo<=2?'rgba(251,191,36,.35)':'rgba(52,211,153,.2)'}">
          <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:4px">🎌 Kakémonos</div>
          <div style="font-size:26px;font-weight:900;line-height:1;color:${kakDispo===0?'#f87171':kakDispo<=2?'#fbbf24':'#34d399'}">${kakDispo}</div>
          <div style="font-size:10px;margin-top:3px;color:${kakDispo===0?'#f87171':kakDispo<=2?'#fbbf24':'var(--muted)'}">
